# ─── Network ──────────────────────────────────────────────────────────────────

# Standard MQTT port — accessible from host and other containers
listener 1883 0.0.0.0

# WebSocket port — for browser clients and future frontend
listener 9001 0.0.0.0
protocol websockets

# ─── Authentication ───────────────────────────────────────────────────────────

# Development mode: allow anonymous connections
# In production: set allow_anonymous false and configure password file
allow_anonymous true

# ─── Persistence ──────────────────────────────────────────────────────────────

# Save messages to disk so they survive broker restart
persistence true
persistence_location /mosquitto/data/

# ─── Logging ──────────────────────────────────────────────────────────────────

log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information

# ─── Limits ───────────────────────────────────────────────────────────────────

# Maximum number of QoS 1 and 2 messages inflight per client
max_inflight_messages 100

# Maximum number of messages in the queue for a client
max_queued_messages 1000
